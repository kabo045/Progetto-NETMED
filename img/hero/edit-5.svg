<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2a3e"/>
      <stop offset="55%" stop-color="#04141f"/>
      <stop offset="100%" stop-color="#02080d"/>
    </linearGradient>
    <radialGradient id="g5cell" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(96,250,180,.18)"/>
      <stop offset="100%" stop-color="rgba(96,250,180,0)"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#g5)"/>
  <!-- Multiple cells (circular bg) -->
  <g>
    <circle cx="1500" cy="380" r="240" fill="url(#g5cell)"/>
    <circle cx="1200" cy="680" r="200" fill="url(#g5cell)"/>
    <circle cx="1680" cy="780" r="160" fill="url(#g5cell)"/>
  </g>
  <!-- Cell 1 (large, top right) -->
  <g transform="translate(1500 380)">
    <circle cx="0" cy="0" r="180" fill="rgba(20,180,120,.15)" stroke="rgba(96,250,180,.7)" stroke-width="3"/>
    <circle cx="0" cy="0" r="60" fill="rgba(96,250,180,.5)" stroke="rgba(120,255,200,.9)" stroke-width="2"/>
    <!-- Organelles -->
    <ellipse cx="-80" cy="40" rx="22" ry="12" fill="rgba(96,250,180,.6)"/>
    <ellipse cx="60" cy="-80" rx="18" ry="10" fill="rgba(96,250,180,.6)" transform="rotate(30 60 -80)"/>
    <ellipse cx="80" cy="80" rx="20" ry="10" fill="rgba(96,250,180,.6)" transform="rotate(-20 80 80)"/>
  </g>
  <!-- Cell 2 -->
  <g transform="translate(1200 680)">
    <circle cx="0" cy="0" r="150" fill="rgba(20,180,120,.12)" stroke="rgba(96,250,180,.55)" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="rgba(96,250,180,.4)" stroke="rgba(120,255,200,.85)" stroke-width="2"/>
    <ellipse cx="-50" cy="50" rx="14" ry="8" fill="rgba(96,250,180,.5)"/>
    <ellipse cx="60" cy="-30" rx="16" ry="9" fill="rgba(96,250,180,.5)"/>
  </g>
  <!-- Cell 3 -->
  <g transform="translate(1680 780)">
    <circle cx="0" cy="0" r="120" fill="rgba(20,180,120,.1)" stroke="rgba(96,250,180,.5)" stroke-width="2"/>
    <circle cx="0" cy="0" r="38" fill="rgba(96,250,180,.4)" stroke="rgba(120,255,200,.85)" stroke-width="2"/>
  </g>
  <!-- Microscope-like reticule top left -->
  <g stroke="rgba(96,250,180,.3)" stroke-width="1" fill="none">
    <line x1="220" y1="540" x2="600" y2="540"/>
    <line x1="410" y1="350" x2="410" y2="730"/>
    <circle cx="410" cy="540" r="160" stroke-width="1.5"/>
    <circle cx="410" cy="540" r="80"/>
  </g>
</svg>
