<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g3" cx="70%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1a4f6e"/>
      <stop offset="55%" stop-color="#0a1e2c"/>
      <stop offset="100%" stop-color="#020812"/>
    </radialGradient>
    <linearGradient id="g3stetho" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.95)"/>
      <stop offset="100%" stop-color="rgba(180,200,220,.65)"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#g3)"/>
  <!-- Stetoscopio stilizzato -->
  <g transform="translate(1380 540)" fill="none" stroke="url(#g3stetho)" stroke-width="14" stroke-linecap="round">
    <!-- Auricolari -->
    <path d="M -300 -340 L -300 -180"/>
    <path d="M 300 -340 L 300 -180"/>
    <!-- Tube -->
    <path d="M -300 -180 Q -300 60, -120 60"/>
    <path d="M 300 -180 Q 300 60, 120 60"/>
    <!-- Connector -->
    <path d="M -120 60 Q 0 80, 0 180"/>
    <path d="M 120 60 Q 0 80, 0 180"/>
    <!-- Diaphragm tube -->
    <path d="M 0 180 L 0 280" stroke-width="12"/>
  </g>
  <!-- Diaphragm circle -->
  <g transform="translate(1380 540)">
    <circle cx="0" cy="340" r="90" fill="rgba(255,255,255,.95)" stroke="rgba(180,200,220,.8)" stroke-width="6"/>
    <circle cx="0" cy="340" r="68" fill="none" stroke="rgba(50,80,110,.4)" stroke-width="2"/>
    <circle cx="0" cy="340" r="48" fill="none" stroke="rgba(50,80,110,.3)" stroke-width="2"/>
  </g>
  <!-- Earpieces -->
  <g transform="translate(1380 540)" fill="rgba(180,200,220,.95)">
    <circle cx="-300" cy="-360" r="22"/>
    <circle cx="300" cy="-360" r="22"/>
  </g>
  <!-- Decorative dots -->
  <g fill="rgba(13,122,77,.5)">
    <circle cx="200" cy="200" r="6"/>
    <circle cx="280" cy="320" r="4"/>
    <circle cx="160" cy="420" r="5"/>
    <circle cx="380" cy="700" r="6"/>
    <circle cx="220" cy="820" r="4"/>
  </g>
</svg>
