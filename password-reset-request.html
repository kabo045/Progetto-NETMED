<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#08562f"/>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg"/>
<title>NETMED</title>
<link rel="stylesheet" href="css/login.css?v=20260615yl"/>
<link rel="stylesheet" href="css/auth-common.css?v=20260615yl"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="hero">
  <div class="logo-netmed"><a href="index.html"><span class="logo-mark-inline">N</span></a></div>
  <h1 data-i18n-html="reset.h1">Recupero password</h1>
  <p>Inserisci l'indirizzo email del tuo account. Ti invieremo un link per impostare una nuova password.</p>

  <form id="prReqForm" class="cta-pill" novalidate>
    <div id="prMsg"></div>
    <input type="email" id="prEmail" placeholder="Email" required autocomplete="email" maxlength="120"/>
    <button type="submit" class="btn-pill" id="prReqBtn"><span id="prReqLabel">Invia link di recupero</span></button>
  </form>

  <div class="auth-buttons">
    <a href="login.html" class="btn-access">Torna al login</a>
  </div>
</div>

<script>
(function () {
  const form  = document.getElementById("prReqForm");
  const email = document.getElementById("prEmail");
  const msg   = document.getElementById("prMsg");
  const btn   = document.getElementById("prReqBtn");
  const lbl   = document.getElementById("prReqLabel");

  // Stili inline minimi per il messaggio (no dipendenze)
  msg.style.cssText = "padding:0;min-height:0;transition:all .25s;font-size:13px;font-weight:600;text-align:center;border-radius:10px";
  function setMsg(text, kind) {
    msg.textContent = text;
    msg.style.padding = text ? "12px 14px" : "0";
    msg.style.marginBottom = text ? "12px" : "0";
    if (kind === "ok") {
      msg.style.background = "rgba(13,122,77,.16)";
      msg.style.color = "#9ae5b9";
      msg.style.border = "1px solid rgba(13,122,77,.35)";
    } else if (kind === "err") {
      msg.style.background = "rgba(244,63,94,.16)";
      msg.style.color = "#fda4af";
      msg.style.border = "1px solid rgba(244,63,94,.35)";
    } else {
      msg.style.background = "rgba(255,255,255,.06)";
      msg.style.color = "#c2c8cf";
      msg.style.border = "1px solid rgba(255,255,255,.12)";
    }
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const v = (email.value || "").trim();
    if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
      setMsg("Inserisci un indirizzo email valido.", "err");
      email.focus();
      return;
    }
    btn.disabled = true;
    lbl.textContent = "Invio in corso...";
    setMsg("Verifico la tua email...", "info");
    try {
      const r = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: v })
      });
      // Risposta sempre 200 (privacy): mostriamo lo stesso messaggio
      // anche se l'email non esiste.
      setMsg("Se l'indirizzo esiste, riceverai un'email con il link per reimpostare la password. Controlla anche lo spam.", "ok");
      email.disabled = true;
      lbl.textContent = "Email inviata";
    } catch (err) {
      setMsg("Impossibile contattare il server. Riprova tra poco.", "err");
      btn.disabled = false;
      lbl.textContent = "Invia link di recupero";
    }
  });
})();
</script>
<script src="js/cookie-banner.js?v=20260615yl"></script>
<script src="js/i18n.js?v=20260615yl"></script>
</body>
</html>
