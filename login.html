<body>

<div class="hero">
  <div class="logo-netmed">
    <a href="index.html"><span class="logo-mark-inline">N</span></a>
  </div>

  <h1 data-i18n-html="login.h1_full">Accedi al tuo <span>account</span></h1>
  <p data-i18n="login.p">Inserisci le tue credenziali per accedere alla piattaforma.</p>

  <form id="loginForm" class="cta-pill" novalidate>
    <!-- Contenitore per messaggi di errore (email sbagliata, password non valida, ecc.) -->
    <div id="formMessage"></div>

    <input type="email" id="email" data-i18n-placeholder="common.email"
           placeholder="Email" required autocomplete="email">

    <!-- Password + toggle mostra/nascondi -->
    <div class="pw-wrap">
      <input type="password" id="password" data-i18n-placeholder="common.password"
             placeholder="Password" required autocomplete="current-password">
      <button type="button" class="pw-toggle" onclick="togglePw('password',this)"
              aria-label="Mostra/nascondi password">•</button>
    </div>

    <button type="submit" class="btn-pill" id="submitBtn">
      <span id="btnText" data-i18n="login.btn">Accedi</span>
    </button>
  </form>

  <!--
    Link "Password dimenticata?"
  -->
  <div style="margin-top:8px;text-align:center">
    <a href="password-reset-request.html"
       style="color:rgba(255,255,255,.7);font-size:.88rem;text-decoration:none;font-weight:600">Password dimenticata?</a>
  </div>

  <div class="auth-buttons">
    <a href="registrazione.html" class="btn-register" data-i18n="login.no_account">Non hai un account? Registrati</a>
  </div>
</div>
